<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="https://ik.imagekit.io/zslvvoal4/Favicon.webp?updatedAt=1761153165739" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Thumbnails Desfocadas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Sora', sans-serif;
      }
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        background: url('https://www.transparenttextures.com/patterns/noise.png');
        opacity: 0.02;
        z-index: -2;
      }
      @keyframes aurora-1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-20px, 30px) scale(1.05); } }
      @keyframes aurora-2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -20px) scale(0.95); } }
      @keyframes aurora-3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(20px, 20px) scale(1.1); } }
      .animate-aurora-1 { animation: aurora-1 18s infinite ease-in-out; }
      .animate-aurora-2 { animation: aurora-2 22s infinite ease-in-out; }
      .animate-aurora-3 { animation: aurora-3 20s infinite ease-in-out; }
    </style>
